services:

  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: demo_db
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U demo_user -d demo_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: springboot-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/demo_db
      SPRING_DATASOURCE_USERNAME: demo_user
      SPRING_DATASOURCE_PASSWORD: demo_pass
      JWT_SECRET: MaCleSecreteTrèsComplexe123456789012
      ML_SERVICE_URL: http://host.docker.internal:8000
    restart: always

volumes:
  pgdata:
