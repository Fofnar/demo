services:

  # Base de données PostgreSQL utilisée par le backend Spring Boot en environnement local Docker.
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_DB: demo_db
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_pass

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    # Vérifie que PostgreSQL est prêt avant le démarrage du backend.
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U demo_user -d demo_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # API backend Spring Boot.
  # En local, elle est connectée à PostgreSQL via le réseau Docker Compose.
  app:
    build: .
    container_name: springboot-app
    restart: always

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/demo_db
      SPRING_DATASOURCE_USERNAME: demo_user
      SPRING_DATASOURCE_PASSWORD: demo_pass

      # Clé utilisée pour signer les tokens JWT en local.
      # En production, cette valeur doit être configurée dans les variables d'environnement Render.
      JWT_SECRET: MaCleSecreteTresComplexe12345678901234567890

      # En local Docker, le backend appelle le service IA lancé sur la machine hôte.
      ML_SERVICE_URL: http://host.docker.internal:8000

      # Origine frontend autorisée en local.
      # En production, ajouter l'URL Render du frontend.
      CORS_ALLOWED_ORIGINS: http://localhost:4200

      SPRING_JPA_SHOW_SQL: "false"
      SPRING_SECURITY_LOG_LEVEL: INFO
      SPRING_SECURITY_DEBUG: "false"

volumes:
  # Volume persistant pour conserver les données PostgreSQL entre les redémarrages.
  pgdata: