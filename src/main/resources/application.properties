# ===============================
# DATABASE CONFIG
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/demo_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:demo_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:demo_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# ===============================
# SERVER
# ===============================
server.address=0.0.0.0
server.port=${PORT:8080}

# ===============================
# H2 (DESACTIVE)
# ===============================
spring.h2.console.enabled=false

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}

# ===============================
# ML SERVICE
# ===============================
ml.service.url=${ML_SERVICE_URL:http://host.docker.internal:8000}

# ===============================
# CORS
# ===============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ===============================
# SECURITY LOGS
# ===============================
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}
spring.security.debug=${SPRING_SECURITY_DEBUG:false}