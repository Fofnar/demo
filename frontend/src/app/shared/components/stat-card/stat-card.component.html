<article class="stat-card" [class.alert]="alert"> <!-- Carte principale, avec classe alert si besoin -->
  <p class="stat-label">{{ label }}</p> <!-- Titre de la statistique -->
  <h2>{{ value }}</h2> <!-- Valeur numérique ou texte -->
  <span class="stat-hint">{{ hint }}</span> <!-- Petit texte explicatif -->
</article>
